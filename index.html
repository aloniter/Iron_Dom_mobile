<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="כיפת ברזל">
  <meta name="theme-color" content="#0a0a2e">
  <meta name="description" content="כיפת ברזל — משחק הגנה מטילים למובייל. הגנו על ערים בעזרת יירוט טילים במסך מגע.">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.webmanifest">

  <!-- App Icons -->
  <link rel="icon" type="image/png" href="photos/icon.png">
  <link rel="shortcut icon" href="photos/icon.png">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="photos/icon.png">
  <link rel="apple-touch-icon" sizes="57x57"   href="photos/icon.png">
  <link rel="apple-touch-icon" sizes="60x60"   href="photos/icon.png">
  <link rel="apple-touch-icon" sizes="72x72"   href="photos/icon.png">
  <link rel="apple-touch-icon" sizes="76x76"   href="photos/icon.png">
  <link rel="apple-touch-icon" sizes="114x114" href="photos/icon.png">
  <link rel="apple-touch-icon" sizes="120x120" href="photos/icon.png">
  <link rel="apple-touch-icon" sizes="144x144" href="photos/icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="photos/icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="photos/icon.png">

  <!-- Android / Chrome Icons -->
  <link rel="icon" type="image/png" sizes="16x16"   href="photos/icon.png">
  <link rel="icon" type="image/png" sizes="32x32"   href="photos/icon.png">
  <link rel="icon" type="image/png" sizes="96x96"   href="photos/icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="photos/icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="photos/icon.png">

  <!-- Microsoft Tiles -->
  <meta name="msapplication-TileImage" content="photos/icon.png">
  <meta name="msapplication-TileColor" content="#0a0a2e">

  <title>כיפת ברזל — משחק הגנה מטילים</title>
  <link rel="stylesheet" href="style.css">

  <!-- Critical asset preloads -->
  <link rel="preload" as="image" href="photos/Tel_aviv.png">
  <link rel="preload" as="image" href="photos/jerusalem.png">
  <link rel="preload" as="image" href="photos/haifa.png">
  <link rel="preload" as="image" href="photos/iran_rocket_game.png">
  <link rel="preload" as="image" href="photos/iron_dom.png?v=20260320-1">
  <link rel="preload" as="image" href="photos/israel_rocket_game.png">
</head>
<body>
  <div class="game-container" data-ui-mode="loading" data-city="tel_aviv">

    <!-- ── UI Overlay ── -->
    <div class="ui-overlay">

      <!-- Score Panel (top-left) -->
      <div class="score-panel">
        <div class="score">ניקוד: <span id="score">0</span></div>
        <div class="hits">פגיעות: <span id="hits">0</span>/<span id="maxHits">5</span></div>
        <div class="intercepts">יירוטים: <span id="intercepts">0</span>/<span id="targetIntercepts">20</span></div>
      </div>

      <!-- Game Message Modal (center) -->
      <div class="game-message" id="gameMessage" data-message-style="menu">
        <h2>כיפת ברזל<br><span class="game-title-subtitle">הגנה</span></h2>

        <p id="gameInstructions">
          בחרו מפת עיר והגנו עליה מפני טילים נכנסים.<br>
          <strong>העיר הנוכחית:</strong> תל אביב<br>
          הקישו בכל מקום כדי לשגר טילי יירוט.
        </p>

        <!-- City Selector -->
        <div id="citySelector" class="city-selector">
          <p class="city-selector-label">בחרו עיר להגנה</p>
          <div class="city-options" role="group" aria-label="בחירת עיר להגנה">
            <button type="button" class="city-option-btn selected" data-city="tel_aviv">תל אביב</button>
            <button type="button" class="city-option-btn" data-city="jerusalem">ירושלים</button>
            <button type="button" class="city-option-btn" data-city="haifa">חיפה</button>
          </div>
        </div>

        <!-- Start / Action Button -->
        <button id="startBtn" class="start-button">הגנו עכשיו</button>

        <div class="credits">נוצר על ידי Alon Iter</div>
      </div>

      <!-- Controls (top-right) -->
      <div class="controls">
        <button id="pauseBtn"   class="control-btn" aria-label="השהה">⏸️</button>
        <button id="restartBtn" class="control-btn" aria-label="התחל מחדש">🔄</button>
      </div>

      <!-- Touch Feedback Ring -->
      <div id="touchFeedback" class="touch-feedback" aria-hidden="true"></div>
    </div><!-- /.ui-overlay -->

    <!-- Game Canvas -->
    <canvas id="gameCanvas" aria-label="משטח המשחק של כיפת ברזל"></canvas>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
      <div class="loading-content">
        <h2>🚀 כיפת ברזל</h2>
        <div class="loading-spinner"></div>
        <p>טוען את קובצי המשחק...</p>
      </div>
    </div>

    <!-- Offline Banner -->
    <div id="offlineBanner" class="offline-banner" hidden>אין חיבור לאינטרנט — המשחק פועל מהמטמון.</div>

  </div><!-- /.game-container -->

  <script src="game.js?v=148"></script>

  <script>
    // Unregister all service workers and clear caches to force fresh load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }

    // Offline banner toggle
    (function () {
      const banner = document.getElementById('offlineBanner');
      function update() { banner.hidden = navigator.onLine; }
      window.addEventListener('online',  update);
      window.addEventListener('offline', update);
      update();
    })();
  </script>
</body>
</html>
